name: BuildOnly

on:
  push:
    branches-ignore:
      - main

jobs:
  windows-latest:
    name: windows-latest
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v6.0.0
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
            11.0.x
          dotnet-quality: 'preview'

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v3
        with:
          vs-prerelease: true

      - name: 'Cache: .nuke/temp, ~/.nuget/packages'
        uses: actions/cache@v6
        with:
          path: |
            .nuke/temp
            ~/.nuget/packages
          key: ${{ runner.os }}-${{ hashFiles('**/global.json', '**/*.csproj', '**/Directory.Packages.props') }}

      - name: 'Run: Compile'
        run: ./build.cmd Compile

      - name: Tests + Coverage (MTP)
        shell: bash
        working-directory: 'src'
        run: |
          dotnet test --solution HashTableRx.slnx \
            --configuration Release \
            --coverage \
            --coverage-settings coverage.settings.xml \
            --coverage-output-format cobertura \
            --results-directory ./TestResults

      - name: Verify 100% coverage
        shell: pwsh
        run: |
          $packages = Get-ChildItem ./src/TestResults -Filter *.cobertura.xml | ForEach-Object {
            ([xml](Get-Content $_.FullName)).coverage.packages.package
          }
          $expected = @('HashTableRx', 'HashTableRx.Reactive')
          $actual = @($packages.name | Sort-Object -Unique)
          if (Compare-Object $expected $actual) {
            throw "Coverage must contain only HashTableRx and HashTableRx.Reactive; found: $($actual -join ', ')"
          }
          foreach ($package in $packages) {
            if ([decimal]$package.'line-rate' -ne 1 -or [decimal]$package.'branch-rate' -ne 1) {
              throw "$($package.name) coverage is below 100%: lines=$($package.'line-rate'), branches=$($package.'branch-rate')"
            }
          }

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: tmp-coverage
          path: |
            ./**/TestResults/**/*.cobertura.xml
          if-no-files-found: warn
          retention-days: 3
